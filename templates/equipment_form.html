{% extends 'base.html' %}{% block title %}Register equipment | FIRE-PMIS{% endblock %}{% block content %}<header><div><p class="eyebrow">Equipment registry</p><h1>Register equipment</h1></div></header><section class="form-panel"><form method="post"><div class="form-grid"><label>Asset code<input name="asset_code" required placeholder="e.g., ENG-005"></label><label>Equipment name<input name="name" required></label><label>Category<select name="category"><option>Fire Engine</option><option>Water Pump</option><option>Breathing Apparatus</option><option>Critical Tool</option><option>Other Firefighting Equipment</option></select></label><label>Location<input name="location" required></label><label>Serial number<input name="serial_number"></label><label>Manufacturer<input name="manufacturer"></label><label>Model<input name="model"></label><label>Warranty expiry<input type="date" name="warranty_expiry"></label><label>Supplier<input name="supplier"></label><label>Purchase date<input type="date" name="purchase_date"></label><label>Purchase cost<input type="number" step="0.01" min="0" name="purchase_cost"></label><label>Service interval (days)<input type="number" min="0" name="service_interval_days"></label><label>Criticality<select name="criticality"><option>Standard</option><option>High</option><option>Critical</option></select></label><label>Operational status<select name="operational_status"><option>Operational</option><option>Under Maintenance</option><option>Out of Service</option></select></label></div><label>Notes<textarea name="notes" rows="3" placeholder="Equipment profile details or remarks"></textarea></label><div class="actions"><button>Save equipment</button><a class="button muted" href="{{ url_for('equipment_list') }}">Cancel</a></div></form></section>{% endblock %}
